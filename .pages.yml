# Pages CMS configuration — https://pagescms.org/docs/configuration
# Lives at the repo root. Pages CMS reads it per repo and per branch.
#
# Scope: the homepage (src/content/home.json). Nav, footer and site name/SEO are
# intentionally hardcoded in the components, not edited here.

media:
  input: public/images # where uploaded files are stored in the repo
  output: /images # the path written into content (matches existing image paths)

content:
  # ----------------------------------------------------------------- Homepage
  # Single data file (src/content/home.json) rendered by src/pages/index.astro.
  # Each section below maps to one block of the homepage.
  - name: home
    label: Homepage
    type: file
    path: src/content/home.json
    fields:
      - name: hero
        label: 1. Hero
        type: object
        fields:
          - { name: eyebrow, label: Eyebrow, type: string }
          - { name: title, label: Title, type: string, required: true }
          - { name: subtitle, label: Subtitle, type: string }
          - { name: backgroundImage, label: Background image, type: image }
          - { name: facts, label: Fact lines, type: string, list: true }
          - name: primaryCta
            label: Primary button
            type: object
            fields:
              - { name: label, label: Label, type: string }
              - { name: href, label: Link, type: string }
          - name: secondaryCta
            label: Secondary button
            type: object
            fields:
              - { name: label, label: Label, type: string }
              - { name: href, label: Link, type: string }
          - { name: footnote, label: Footnote, type: string }
          - name: saveDate
            label: Save-the-date strip
            type: object
            fields:
              - { name: label, label: Label, type: string }
              - { name: value, label: Value, type: string }
              - name: cta
                label: Button
                type: object
                fields:
                  - { name: label, label: Label, type: string }
                  - { name: href, label: Link, type: string }
          - name: eventDetails
            label: Event details (3 columns)
            type: object
            list: true
            fields:
              - { name: label, label: Label, type: string }
              - { name: value, label: Value, type: string }

      - name: vision
        label: 2. Vision
        type: object
        fields:
          - { name: badge, label: Badge, type: string }
          - { name: heading, label: Heading, type: string, required: true }
          - { name: lead, label: Lead paragraph, type: text }
          - name: learnMore
            label: "Learn-more link"
            type: object
            fields:
              - { name: label, label: Label, type: string }
              - { name: href, label: Link, type: string }
          - name: card
            label: Highlight card
            type: object
            fields:
              - { name: image, label: Image, type: image }
              - { name: title, label: Title, type: string }
              - { name: subtitle, label: Subtitle, type: string }
              - name: cta
                label: Button
                type: object
                fields:
                  - { name: label, label: Label, type: string }
                  - { name: href, label: Link, type: string }
          - { name: paragraphs, label: Body paragraphs, type: text, list: true }

      - name: conference
        label: 3. Conference intro
        type: object
        fields:
          - { name: heading, label: Heading, type: string, required: true }
          - { name: body, label: Body, type: text }
          - { name: facts, label: Fact lines, type: string, list: true }
          - name: image
            label: Image
            type: object
            fields:
              - { name: src, label: Image, type: image }
              - { name: alt, label: Alt text, type: string }
          - name: cta
            label: Button
            type: object
            fields:
              - { name: label, label: Label, type: string }
              - { name: href, label: Link, type: string }

      - name: whyAttend
        label: 4. Why attend
        type: object
        fields:
          - { name: heading, label: Heading, type: string, required: true }
          - { name: benefits, label: Benefits, type: string, list: true }
          - name: image
            label: Image
            type: object
            fields:
              - { name: src, label: Image, type: image }
              - { name: alt, label: Alt text, type: string }
          - name: cta
            label: Button
            type: object
            fields:
              - { name: label, label: Label, type: string }
              - { name: href, label: Link, type: string }

      - name: speakers
        label: 5. Speakers
        type: object
        fields:
          - { name: badge, label: Badge, type: string }
          - { name: heading, label: Heading, type: string }
          - { name: description, label: Description, type: text }
          - name: cta
            label: Button
            type: object
            fields:
              - { name: label, label: Label, type: string }
              - { name: href, label: Link, type: string }
          - name: items
            label: Speaker cards
            type: object
            list:
              collapsible:
                collapsed: true
                summary: '{fields.name}'
            fields:
              - { name: name, label: Name, type: string, required: true }
              - { name: role, label: Role / company, type: string }
              - { name: theme, label: Talk theme, type: string }
              - { name: portrait, label: Portrait, type: image }

      - name: partners
        label: 6. Partners
        type: object
        fields:
          - { name: heading, label: Heading, type: string }
          - { name: description, label: Description, type: text }
          - name: items
            label: Partner logos
            type: object
            list:
              collapsible:
                collapsed: true
                summary: '{fields.alt}'
            fields:
              - { name: src, label: Logo, type: image }
              - { name: alt, label: Name / alt text, type: string }
              - { name: href, label: Link, type: string }

      - name: finalCta
        label: 7. Final CTA
        type: object
        fields:
          - { name: eyebrow, label: Eyebrow, type: string }
          - { name: heading, label: Heading, type: string }
          - { name: body, label: Body, type: text }
          - name: cta
            label: Button
            type: object
            fields:
              - { name: label, label: Label, type: string }
              - { name: href, label: Link, type: string }
          - name: image
            label: Image
            type: object
            fields:
              - { name: src, label: Image, type: image }
              - { name: alt, label: Alt text, type: string }

      - name: newsletter
        label: 8. Newsletter
        type: object
        fields:
          - { name: badge, label: Badge, type: string }
          - { name: heading, label: Heading, type: string }
          - { name: description, label: Description, type: text }
          - { name: formEyebrow, label: Form eyebrow, type: string }
          - { name: formHeading, label: Form heading, type: string }
          - { name: successMessage, label: Success message, type: text }
          - name: perksCard
            label: Perks card
            type: object
            fields:
              - { name: eyebrow, label: Eyebrow, type: string }
              - { name: heading, label: Heading, type: string }
              - { name: perks, label: Perks, type: string, list: true }

  # ------------------------------------------------------------ Site settings
  # Branding shared across every page (src/content/settings.json), read by the
  # navbar and footer.
  - name: settings
    label: Site settings
    type: file
    path: src/content/settings.json
    fields:
      - {
          name: logo,
          label: Logo,
          type: image,
          description: 'Shown in the header and footer. Use a transparent PNG or SVG. Leave empty to fall back to the default mark + site name.',
        }
      - {
          name: siteName,
          label: Site name,
          type: string,
          required: true,
          description: 'Brand text shown next to / instead of the logo.',
        }

