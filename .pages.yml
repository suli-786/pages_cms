# Pages CMS configuration — https://pagescms.org/docs/configuration
# Lives at the repo root. Pages CMS reads it per repo and per branch.
#
# Scope: the homepage, About page, Partner page (src/content/*.json) and site
# settings (src/content/settings.json), mirroring the zod schemas in
# src/lib/{home,about,partner,site}.ts — each page block carries its own
# mirror note. Nav, footer links and SEO are hardcoded.
#
# Every homepage section has a "Show section" switch: turning it off hides the
# section on the site but keeps its content, so it can be switched back on.
#
# Change this file and the zod schemas together. The `palette` field below is
# a three-way contract:
# .pages.yml values <-> PALETTES in src/lib/theme.ts <-> .theme-<id> rule pairs
# in src/styles/themes.css. `npm run check` asserts all three agree.

media:
  # Uploads live under src/ so Astro's image pipeline optimizes them at build
  # time (resize + WebP + srcset — see src/lib/images.ts). `output` still
  # writes `/images/...` into content, so existing paths keep working; the
  # resolver maps that prefix onto src/assets/images.
  input: src/assets/images # where uploaded files are stored in the repo
  output: /images # the path written into content (matches existing image paths)
  categories: [image] # editors can only upload image files
  rename: safe # slugify upload filenames (no more "photo (1).jpg")

# ------------------------------------------------------- Reusable field groups
components:
  visible:
    type: boolean
    label: Show section
    default: true
    description: 'Turn off to hide this section on the site. Its content is kept and it can be switched back on any time.'
  cta:
    type: object
    label: Button
    fields:
      - { name: label, label: Label, type: string }
      - {
          name: href,
          label: Link,
          type: string,
          description: 'A page like /partner, a section anchor on the page the button appears on (homepage sections: #vision, #event, #speakers, #partners, #contact), or the word whatsapp to use the WhatsApp community link from Site settings.',
        }
  picture:
    type: object
    label: Image
    fields:
      - { name: src, label: Image, type: image }
      - {
          name: alt,
          label: Alt text,
          type: string,
          description: 'Describe the image for screen readers and search engines.',
        }

content:
  # ----------------------------------------------------------------- Homepage
  # Single data file (src/content/home.json) rendered by src/pages/index.astro.
  # Each section below maps to one block of the homepage.
  - name: home
    label: Homepage
    type: file
    path: src/content/home.json
    fields:
      - name: hero
        label: 1. Hero
        type: object
        fields:
          - { name: visible, component: visible }
          - {
              name: eyebrow,
              label: Eyebrow,
              type: string,
              description: 'Small line above the title — the event name. Part of the page heading, so keep it descriptive.',
            }
          - {
              name: title,
              label: Title,
              type: string,
              required: true,
              description: 'The big statement. Wrap words in *asterisks* to emphasise them, e.g. "We''re building *what''s worth inheriting.* Be part of it.".',
            }
          - name: eventDetails
            label: Event details (icon row)
            type: object
            list:
              collapsible:
                collapsed: true
                summary: '{fields.value}'
            description: 'Shown with calendar / map-pin icons, in this order.'
            fields:
              - { name: label, label: Label, type: string }
              - { name: value, label: Value, type: string }
          - { name: primaryCta, label: Ticket button, component: cta }
          - name: community
            label: Community invite
            type: object
            description: 'The WhatsApp community block under the ticket button.'
            fields:
              - { name: body, label: Wording, type: text }
              - { name: cta, label: WhatsApp button, component: cta }
          - {
              name: socialsLabel,
              label: Social links caption,
              type: string,
              description: 'Caption above the social icons. The icons themselves come from Site settings → Social links. Leave empty to hide the caption.',
            }
          - {
              name: gallery,
              label: Photo grid,
              type: image,
              list: true,
              description: 'The rotating 3×3 wall. The first nine images show first, then it cycles nine at a time. The nine Home-carousal-logo tiles assemble the logo — keep them together and in their 1-9 order (they show first right now).',
            }

      - name: vision
        label: 2. Vision
        type: object
        fields:
          - { name: visible, component: visible }
          - {
              name: heading,
              label: Heading,
              type: string,
              description: 'The opening declaration. Same size as the text below it, but in full colour.',
            }
          - {
              name: statement,
              label: Statement,
              type: text,
              description: 'Everything under the heading. Leave an empty line between paragraphs; a single new line breaks the line where you break it. Wrap words in *asterisks* to emphasise them.',
            }
          - name: highlights
            label: Highlighted phrases
            type: object
            list:
              collapsible:
                collapsed: true
                summary: '{fields.phrase}'
            description: 'Each phrase must appear word-for-word in the heading or statement above. It is shown in full colour; add a photo and it also reveals that photo on hover. A phrase with no photo is still highlighted, just without the hover preview.'
            fields:
              - { name: phrase, label: Phrase, type: string }
              - { name: image, label: 'Hover photo (optional)', type: image }
              - { name: href, label: 'Link (optional)', type: string }

      - name: conference
        label: 3. Conference & Why Attend
        type: object
        fields:
          - { name: visible, component: visible }
          - {
              name: tagline,
              label: Tagline,
              type: string,
              description: 'Small uppercase line above the heading. Leave empty to hide it.',
            }
          - { name: heading, label: Heading, type: string, required: true }
          - { name: body, label: Body, type: text }
          - name: tiles
            label: Photo tiles
            type: object
            list:
              collapsible:
                collapsed: true
                summary: '{fields.caption}'
            description: 'The two wide photo cards in the grid. Only the first two with an image are shown. Each has a caption, an optional link and a link label shown at the bottom.'
            fields:
              - { name: image, component: picture }
              - { name: caption, label: Caption, type: string }
              - {
                  name: href,
                  label: Link,
                  type: string,
                  description: 'A section anchor (e.g. #speakers) or the word whatsapp to use the WhatsApp community link from Site settings.',
                }
              - { name: linkLabel, label: Link label, type: string }
          - name: benefits
            label: Why attend (cards)
            type: object
            list:
              collapsible:
                collapsed: true
                summary: '{fields.title}'
            description: 'Four look best. Each card is a category, a title and a short paragraph, e.g. "Community · Find Your People · Building can be lonely…".'
            fields:
              - {
                  name: category,
                  label: Category,
                  type: string,
                  description: 'Small label above the title, e.g. "Community".',
                }
              - { name: title, label: Title, type: string }
              - { name: body, label: Body, type: text }

      - name: speakers
        label: 4. Speakers
        type: object
        fields:
          - { name: visible, component: visible }
          - { name: heading, label: Heading, type: string }
          - { name: description, label: Description, type: text }
          - { name: cta, label: 'Corner link (top right)', component: cta }
          - name: items
            label: Speaker cards
            type: object
            list:
              collapsible:
                collapsed: true
                summary: '{fields.name}'
            description: 'Shown as a card grid in the Speakers section.'
            fields:
              - { name: name, label: Name, type: string, required: true }
              - { name: role, label: Role / company, type: string }
              - { name: theme, label: Talk theme, type: string }
              - { name: portrait, label: Portrait, type: image }

      - name: partners
        label: 5. Partners
        type: object
        fields:
          - { name: visible, component: visible }
          - { name: heading, label: Heading, type: string }
          - { name: description, label: Description, type: text }
          - name: items
            label: Partner logos
            type: object
            list:
              collapsible:
                collapsed: true
                summary: '{fields.alt}'
            description: 'Grouped by tier: Headline and Supporting logos get a square framed spotlight (labelled by tier), Regular logos scroll in the marquee. Order within the list is the order within each tier.'
            fields:
              - { name: src, label: Logo, type: image }
              - { name: alt, label: Name / alt text, type: string }
              - name: tier
                label: Tier
                type: select
                default: regular
                options:
                  values:
                    - { value: headline, label: Headline }
                    - { value: supporting, label: Supporting }
                    - { value: regular, label: Regular }
              - {
                  name: href,
                  label: Website (optional),
                  type: string,
                  description: 'Headline and Supporting logos become links when this is a full URL. The scrolling Regular logos are never clickable.',
                }

      - name: finalCta
        label: 6. Final CTA (countdown)
        type: object
        fields:
          - { name: visible, component: visible }
          - {
              name: eyebrow,
              label: Eyebrow,
              type: string,
              description: 'The date · venue line shown inside the corner brackets, e.g. "7 November 2026 · Johannesburg".',
            }
          - {
              name: heading,
              label: Heading,
              type: string,
              description: 'The big closing statement. Wrap words in *asterisks* to emphasise them.',
            }
          - { name: body, label: 'Body (optional)', type: text }
          - {
              name: date,
              label: Conference date,
              type: date,
              description: 'The countdown counts down to this date. Leave empty to hide the countdown.',
            }
          - { name: cta, label: Button, component: cta }
          - {
              name: image,
              label: Background photo,
              type: object,
              component: picture,
              description: 'Full-width photo behind the whole section (a dark tint is applied on top).',
            }

      - name: contact
        label: 7. Contact
        type: object
        fields:
          - { name: visible, component: visible }
          - { name: heading, label: Heading, type: string }
          - { name: description, label: Description, type: text }
          - {
              name: successMessage,
              label: Success message,
              type: text,
              description: 'Shown after the form is sent. The four enquiry types (Contact / Speaker / Volunteer / Partner) are fixed — ask a developer to change them.',
            }

  # -------------------------------------------------------------- About page
  # Single data file (src/content/about.json) rendered by src/pages/about.astro.
  # Mirrors the zod schema in src/lib/about.ts — change both together.
  - name: about
    label: About page
    type: file
    path: src/content/about.json
    fields:
      - name: intro
        label: 1. Intro
        type: object
        fields:
          - { name: visible, component: visible }
          - {
              name: title,
              label: Title,
              type: string,
              required: true,
              description: 'The page heading. Wrap words in *asterisks* to emphasise them, e.g. "More than a conference — *a movement.*".',
            }
          - {
              name: body,
              label: Body,
              type: text,
              description: 'Leave a blank line between paragraphs. Wrap words in *asterisks* to emphasise them, or _underscores_ for plain italics (used for Arabic terms).',
            }

      - name: story
        label: 2. Our story
        type: object
        fields:
          - { name: visible, component: visible }
          - { name: heading, label: Heading, type: string }
          - name: milestones
            label: Milestones
            type: object
            list:
              collapsible:
                collapsed: true
                summary: '{fields.date} — {fields.title}'
            description: 'One dated beat each, oldest first. Shown as a scrolling timeline with a sticky date bar.'
            fields:
              - {
                  name: date,
                  label: Year,
                  type: string,
                  description: 'The year only, e.g. "2025" — shown large in the sticky bar. Put full dates in the body text.',
                }
              - { name: title, label: Title, type: string }
              - { name: body, label: Body, type: text }
              - { name: image, label: Photo, component: picture }

      - name: why
        label: 3. Why we exist
        type: object
        fields:
          - { name: visible, component: visible }
          - { name: heading, label: Heading, type: string }
          - name: items
            label: Challenges
            type: object
            list:
              collapsible:
                collapsed: true
                summary: '{fields.title}'
            description: 'Shown as columns. Four works best; more will wrap.'
            fields:
              - name: icon
                label: Icon
                type: select
                options:
                  values:
                    - building-2
                    - compass
                    - cpu
                    - globe
                    - handshake
                    - heart
                    - lightbulb
                    - mic-off
                    - network
                    - scale
                    - server
                    - shield-check
                    - sprout
                    - users
              - { name: title, label: Title, type: string }
              - { name: body, label: Body, type: text }

      - name: beliefs
        label: 4. What we stand for
        type: object
        fields:
          - { name: visible, component: visible }
          - { name: heading, label: Heading, type: string }
          - { name: lead, label: Intro paragraph, type: text }
          - name: items
            label: Propositions
            type: object
            list:
              collapsible:
                collapsed: true
                summary: '{fields.title}'
            description: 'Numbered automatically in the order listed.'
            fields:
              - { name: title, label: Title, type: string }
              - { name: body, label: Body, type: text }

      - name: team
        label: 5. Who's behind Ummah Tech
        type: object
        fields:
          - { name: visible, component: visible }
          - { name: heading, label: Heading, type: string }
          - name: photos
            label: Photos
            type: object
            list:
              collapsible:
                collapsed: true
                summary: '{fields.alt}'
            description: 'A photo wall of the people behind Ummah Tech. The whole section stays hidden on the site until the first photo is added here.'
            fields:
              - { name: src, label: Image, type: image }
              - {
                  name: alt,
                  label: Alt text,
                  type: string,
                  required: true,
                  description: 'Describe the photo for screen readers and search engines. Required here: the photos are this section''s only content, so a photo without a description is invisible to screen-reader visitors.',
                }

      - name: join
        label: 6. Join the community (closing)
        type: object
        fields:
          - { name: visible, component: visible }
          - {
              name: heading,
              label: Heading,
              type: string,
              description: 'Wrap words in *asterisks* to emphasise them.',
            }
          - { name: body, label: Body, type: text }
          - { name: cta, label: Main button, component: cta }
          - { name: secondaryCta, label: Secondary link, component: cta }
          - name: photos
            label: Community photos
            type: object
            list:
              collapsible:
                collapsed: true
                summary: '{fields.alt}'
            description: 'Shown as a reveal grid below the call to action. Photos of different shapes tile together nicely. Leave empty to show just the heading and buttons.'
            fields:
              - { name: src, label: Image, type: image }
              - {
                  name: alt,
                  label: Alt text,
                  type: string,
                  description: 'Describe the photo for screen readers and search engines.',
                }

      # The same contact section as the homepage (one form, four enquiry
      # types), with this page's own copy.
      - name: contact
        label: 7. Contact
        type: object
        fields:
          - { name: visible, component: visible }
          - { name: heading, label: Heading, type: string }
          - { name: description, label: Description, type: text }
          - {
              name: successMessage,
              label: Success message,
              type: text,
              description: 'Shown after the form is sent. The four enquiry types (Contact / Speaker / Volunteer / Partner) are fixed — ask a developer to change them.',
            }

  # ------------------------------------------------------------- Partner page
  # Single data file (src/content/partner.json) rendered by
  # src/pages/partner.astro. Mirrors the zod schema in src/lib/partner.ts —
  # change both together. Solely for sponsors and partner organisations.
  - name: partner
    label: Partner page
    type: file
    path: src/content/partner.json
    fields:
      - name: intro
        label: 1. Intro
        type: object
        fields:
          - { name: visible, component: visible }
          - {
              name: title,
              label: Title,
              type: string,
              required: true,
              description: 'The page heading. Wrap words in *asterisks* to emphasise them.',
            }
          - {
              name: body,
              label: Body,
              type: text,
              description: 'Leave a blank line between paragraphs.',
            }

      - name: why
        label: 2. Why partner
        type: object
        fields:
          - { name: visible, component: visible }
          - { name: heading, label: Heading, type: string }
          - name: items
            label: Reasons
            type: object
            list:
              collapsible:
                collapsed: true
                summary: '{fields.title}'
            description: 'Four look best — shown as cards in a two-column grid.'
            fields:
              - name: icon
                label: Icon
                type: select
                options:
                  values:
                    - building-2
                    - compass
                    - cpu
                    - globe
                    - handshake
                    - heart
                    - lightbulb
                    - mic-off
                    - network
                    - scale
                    - server
                    - shield-check
                    - sprout
                    - users
              - { name: title, label: Title, type: string }
              - { name: body, label: Body, type: text }

      # The same partners section as the homepage (framed spotlights +
      # scrolling row), here holding the CURRENT partners. Mirrors the shared
      # partnersSchema in src/lib/content.ts.
      - name: partners
        label: 3. Current partners
        type: object
        fields:
          - { name: visible, component: visible }
          - { name: heading, label: Heading, type: string }
          - { name: description, label: Description, type: text }
          - name: items
            label: Partner logos
            type: object
            list:
              collapsible:
                collapsed: true
                summary: '{fields.alt}'
            description: 'The whole section stays hidden on the site until the first partner is added here. Headline and Supporting logos get a square framed spotlight (labelled by tier), Regular logos scroll in the marquee — e.g. Platinum → Headline, Gold → Supporting, Silver → Regular. Order within the list is the order within each tier.'
            fields:
              - { name: src, label: Logo, type: image }
              - { name: alt, label: Name / alt text, type: string }
              - name: tier
                label: Tier
                type: select
                default: regular
                options:
                  values:
                    - { value: headline, label: Headline }
                    - { value: supporting, label: Supporting }
                    - { value: regular, label: Regular }
              - {
                  name: href,
                  label: Website (optional),
                  type: string,
                  description: 'Headline and Supporting logos become links when this is a full URL. The scrolling Regular logos are never clickable.',
                }

      # A comparison matrix. The three tier columns (Platinum / Gold / Silver)
      # are fixed — they mirror PARTNER_TIERS in src/lib/partner.ts; only the
      # rows are edited here. No prices on purpose — current pricing goes in
      # the prospectus you email to interested organisations.
      - name: tiers
        label: 4. Partnership tiers
        type: object
        fields:
          - { name: visible, component: visible }
          - { name: heading, label: Heading, type: string }
          - { name: lead, label: Intro paragraph, type: text }
          - name: groups
            label: Comparison rows
            type: object
            list:
              collapsible:
                collapsed: true
                summary: '{fields.heading}'
            description: 'Groups of rows in the tier table, e.g. Allocation (numbers) and Benefits (ticks).'
            fields:
              - { name: heading, label: Group heading, type: string }
              - name: rows
                label: Rows
                type: object
                list:
                  collapsible:
                    collapsed: true
                    summary: '{fields.label}'
                description: 'One row per benefit. Fill each tier''s cell: leave it empty if not included, write yes for a tick, or short text shown as-is (e.g. 1, 8, Premium).'
                fields:
                  - { name: label, label: Benefit, type: string }
                  - { name: platinum, label: Platinum, type: string }
                  - { name: gold, label: Gold, type: string }
                  - { name: silver, label: Silver, type: string }

      # The same contact section as the homepage (one form, four enquiry
      # types), with this page's own copy; on this page the form opens
      # preselected on "Partner With Us".
      - name: contact
        label: 5. Contact
        type: object
        fields:
          - { name: visible, component: visible }
          - { name: heading, label: Heading, type: string }
          - { name: description, label: Description, type: text }
          - {
              name: successMessage,
              label: Success message,
              type: text,
              description: 'Shown after the form is sent. The four enquiry types (Contact / Speaker / Volunteer / Partner) are fixed — ask a developer to change them.',
            }

  # ------------------------------------------------------------ Site settings
  # Site-wide settings (src/content/settings.json): the colour palette, the
  # WhatsApp community URL and the social links, entered once and used across
  # the site. The logo lockup is artwork, not editable content.
  - name: settings
    label: Site settings
    type: file
    path: src/content/settings.json
    fields:
      # Mirrors PALETTES in src/lib/theme.ts and the .theme-<id> rule pairs in
      # src/styles/themes.css. Adding an option here without the other two does
      # nothing visible — `npm run check` catches it.
      - name: palette
        label: Colour palette
        type: select
        default: indigo
        options:
          values:
            - { value: indigo, label: 'Midnight Indigo — current brand' }
            - { value: black, label: 'Black — blue and teal on black' }
        description: 'Changes the colour of the whole site at once — buttons, links, headings, and the hero, call-to-action and footer bands. Every option has been checked for readability, so any choice is safe and you can always switch back to Midnight Indigo. See them side by side at /theme-preview before you save. The site updates a few minutes after saving. Please note: the browser tab icon and the social-share image (the picture shown when someone shares a link) are picture files, not colours, so they stay as they are until a designer supplies new versions.'
      - {
          name: whatsapp,
          label: WhatsApp community link,
          type: string,
          description: 'The WhatsApp community invite URL. Entered once here and used by every WhatsApp link on the site (hero, conference section and footer). Leave empty until you have the invite link — the footer link hides itself meanwhile.',
        }
      - name: socials
        label: Social links
        type: object
        list:
          collapsible:
            collapsed: true
            summary: '{fields.platform}'
        description: 'Shown as icons in the hero and the footer. Entered once here so the whole site uses the same list. A row with no link is ignored.'
        fields:
          - name: platform
            label: Platform
            type: select
            options:
              values:
                - facebook
                - x
                - instagram
                - youtube
                - tiktok
                - threads
                - linkedin
                - whatsapp
          - { name: href, label: Link, type: string }
