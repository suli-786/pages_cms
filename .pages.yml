# Pages CMS configuration — https://pagescms.org/docs/configuration
# Lives at the repo root. Pages CMS reads it per repo and per branch.
#
# Scope: the homepage (src/content/home.json) and site settings
# (src/content/settings.json). Nav, footer links and SEO are hardcoded.
#
# Every homepage section has a "Show section" switch: turning it off hides the
# section on the site but keeps its content, so it can be switched back on.
#
# This file mirrors the zod schema in src/lib/home.ts — change both together.

media:
  input: public/images # where uploaded files are stored in the repo
  output: /images # the path written into content (matches existing image paths)
  categories: [image] # editors can only upload image files
  rename: safe # slugify upload filenames (no more "photo (1).jpg")

# ------------------------------------------------------- Reusable field groups
components:
  visible:
    type: boolean
    label: Show section
    default: true
    description: 'Turn off to hide this section on the site. Its content is kept and it can be switched back on any time.'
  cta:
    type: object
    label: Button
    fields:
      - { name: label, label: Label, type: string }
      - { name: href, label: Link, type: string, description: 'Use #vision, #event, #speakers, #partners or #newsletter to jump to a section, or the word whatsapp to use the WhatsApp community link from Site settings.' }
  picture:
    type: object
    label: Image
    fields:
      - { name: src, label: Image, type: image }
      - { name: alt, label: Alt text, type: string, description: 'Describe the image for screen readers and search engines.' }

content:
  # ----------------------------------------------------------------- Homepage
  # Single data file (src/content/home.json) rendered by src/pages/index.astro.
  # Each section below maps to one block of the homepage.
  - name: home
    label: Homepage
    type: file
    path: src/content/home.json
    fields:
      - name: hero
        label: 1. Hero
        type: object
        fields:
          - { name: visible, component: visible }
          - {
              name: eyebrow,
              label: Eyebrow,
              type: string,
              description: 'Small line above the title — the event name. Part of the page heading, so keep it descriptive.',
            }
          - {
              name: title,
              label: Title,
              type: string,
              required: true,
              description: 'The big statement. Wrap words in *asterisks* to emphasise them, e.g. "We''re building *what''s worth inheriting.* Be part of it.".',
            }
          - name: eventDetails
            label: Event details (icon row)
            type: object
            list:
              collapsible:
                collapsed: true
                summary: '{fields.value}'
            description: 'Shown with calendar / map-pin icons, in this order.'
            fields:
              - { name: label, label: Label, type: string }
              - { name: value, label: Value, type: string }
          - { name: primaryCta, label: Ticket button, component: cta }
          - name: community
            label: Community invite
            type: object
            description: 'The WhatsApp community block under the ticket button.'
            fields:
              - { name: body, label: Wording, type: text }
              - { name: cta, label: WhatsApp button, component: cta }
          - {
              name: socialsLabel,
              label: Social links caption,
              type: string,
              description: 'Caption above the social icons. The icons themselves come from Site settings → Social links. Leave empty to hide the caption.',
            }
          - {
              name: gallery,
              label: Photo grid,
              type: image,
              list: true,
              description: 'The rotating 3×3 photo wall. Nine photos fill the grid; add more than nine and it cycles through them.',
            }

      - name: vision
        label: 2. Vision
        type: object
        fields:
          - { name: visible, component: visible }
          - {
              name: heading,
              label: Heading,
              type: string,
              description: 'The opening declaration. Same size as the text below it, but in full colour.',
            }
          - {
              name: statement,
              label: Statement,
              type: text,
              description: 'Everything under the heading. Leave an empty line between paragraphs; a single new line breaks the line where you break it. Wrap words in *asterisks* to emphasise them.',
            }
          - name: highlights
            label: Highlighted phrases
            type: object
            list:
              collapsible:
                collapsed: true
                summary: '{fields.phrase}'
            description: 'Each phrase must appear word-for-word in the heading or statement above. It is shown in full colour; add a photo and it also reveals that photo on hover. A phrase with no photo is still highlighted, just without the hover preview.'
            fields:
              - { name: phrase, label: Phrase, type: string }
              - { name: image, label: 'Hover photo (optional)', type: image }
              - { name: href, label: 'Link (optional)', type: string }

      - name: conference
        label: 3. Conference & Why Attend
        type: object
        fields:
          - { name: visible, component: visible }
          - { name: tagline, label: Tagline, type: string, description: 'Small uppercase line above the heading. Leave empty to hide it.' }
          - { name: heading, label: Heading, type: string, required: true }
          - { name: body, label: Body, type: text }
          - name: tiles
            label: Photo tiles
            type: object
            list:
              collapsible:
                collapsed: true
                summary: '{fields.caption}'
            description: 'The two wide photo cards in the grid. Only the first two with an image are shown. Each has a caption, an optional link and a link label shown at the bottom.'
            fields:
              - { name: image, component: picture }
              - { name: caption, label: Caption, type: string }
              - { name: href, label: Link, type: string, description: 'A section anchor (e.g. #speakers) or the word whatsapp to use the WhatsApp community link from Site settings.' }
              - { name: linkLabel, label: Link label, type: string }
          - name: benefits
            label: Why attend (cards)
            type: object
            list:
              collapsible:
                collapsed: true
                summary: '{fields.title}'
            description: 'Four look best. Each card is a category, a title and a short paragraph, e.g. "Community · Find Your People · Building can be lonely…".'
            fields:
              - { name: category, label: Category, type: string, description: 'Small label above the title, e.g. "Community".' }
              - { name: title, label: Title, type: string }
              - { name: body, label: Body, type: text }

      - name: speakers
        label: 4. Speakers
        type: object
        fields:
          - { name: visible, component: visible }
          - { name: heading, label: Heading, type: string }
          - { name: description, label: Description, type: text }
          - { name: cta, label: 'Corner link (top right)', component: cta }
          - name: items
            label: Speaker cards
            type: object
            list:
              collapsible:
                collapsed: true
                summary: '{fields.name}'
            description: 'Shown as a card grid in the Speakers section.'
            fields:
              - { name: name, label: Name, type: string, required: true }
              - { name: role, label: Role / company, type: string }
              - { name: theme, label: Talk theme, type: string }
              - { name: portrait, label: Portrait, type: image }

      - name: partners
        label: 5. Partners
        type: object
        fields:
          - { name: visible, component: visible }
          - { name: heading, label: Heading, type: string }
          - { name: description, label: Description, type: text }
          - name: items
            label: Partner logos
            type: object
            list:
              collapsible:
                collapsed: true
                summary: '{fields.alt}'
            description: 'Grouped by tier: Headline and Supporting logos get a square framed spotlight (labelled by tier), Regular logos scroll in the marquee. Order within the list is the order within each tier.'
            fields:
              - { name: src, label: Logo, type: image }
              - { name: alt, label: Name / alt text, type: string }
              - name: tier
                label: Tier
                type: select
                default: regular
                options:
                  values:
                    - { value: headline, label: Headline }
                    - { value: supporting, label: Supporting }
                    - { value: regular, label: Regular }
              - {
                  name: href,
                  label: Website (optional),
                  type: string,
                  description: 'Headline and Supporting logos become links when this is a full URL. The scrolling Regular logos are never clickable.',
                }

      - name: finalCta
        label: 6. Final CTA
        type: object
        fields:
          - { name: visible, component: visible }
          - { name: eyebrow, label: Eyebrow, type: string }
          - { name: heading, label: Heading, type: string }
          - { name: body, label: Body, type: text }
          - { name: cta, label: Button, component: cta }
          - { name: image, label: Image, component: picture }

      - name: newsletter
        label: 7. Newsletter
        type: object
        fields:
          - { name: visible, component: visible }
          - { name: badge, label: Badge, type: string }
          - { name: heading, label: Heading, type: string }
          - { name: description, label: Description, type: text }
          - { name: formEyebrow, label: Form eyebrow, type: string }
          - { name: formHeading, label: Form heading, type: string }
          - { name: successMessage, label: Success message, type: text }
          - name: perksCard
            label: Perks card
            type: object
            fields:
              - { name: eyebrow, label: Eyebrow, type: string }
              - { name: heading, label: Heading, type: string }
              - { name: perks, label: Perks, type: string, list: true }

  # ------------------------------------------------------------ Site settings
  # Branding shared across every page (src/content/settings.json): the logo and
  # site name feed the navbar and footer; the social links feed the hero.
  - name: settings
    label: Site settings
    type: file
    path: src/content/settings.json
    fields:
      - {
          name: logo,
          label: Logo,
          type: image,
          description: 'Shown in the header and footer. Use a transparent PNG or SVG. Leave empty to fall back to the default mark + site name.',
        }
      - {
          name: siteName,
          label: Site name,
          type: string,
          required: true,
          description: 'Brand text shown next to / instead of the logo.',
        }
      - {
          name: whatsapp,
          label: WhatsApp community link,
          type: string,
          description: 'The WhatsApp community invite URL. Entered once here and used by every "Join the WhatsApp community" link on the site (the hero and the conference section). Leave empty until you have the invite link.',
        }
      - name: socials
        label: Social links
        type: object
        list:
          collapsible:
            collapsed: true
            summary: '{fields.platform}'
        description: 'Shown as icons in the hero. Entered once here so it can be reused elsewhere on the site. A row with no link is ignored.'
        fields:
          - name: platform
            label: Platform
            type: select
            options:
              values:
                - facebook
                - x
                - instagram
                - youtube
                - tiktok
                - threads
                - linkedin
                - whatsapp
          - { name: href, label: Link, type: string }
